<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline';"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 12px;
        font-family: var(--vscode-font-family);
        font-size: 13px;
        color: var(--vscode-foreground);
        background: var(--vscode-sideBar-background);
      }

      /* ── Header ── */
      .logo {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 16px;
      }
      .logo-icon {
        width: 28px;
        height: 28px;
        background: #00aeec;
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
        flex-shrink: 0;
      }
      .logo-text {
        font-size: 14px;
        font-weight: 600;
        letter-spacing: 0.3px;
      }
      .logo-sub {
        font-size: 11px;
        opacity: 0.5;
      }

      /* ── Input group ── */
      .input-group {
        position: relative;
        margin-bottom: 8px;
      }
      .input-group input {
        width: 100%;
        padding: 7px 36px 7px 10px;
        background: var(--vscode-input-background);
        color: var(--vscode-input-foreground);
        border: 1px solid var(--vscode-input-border, transparent);
        border-radius: 5px;
        font-size: 13px;
        outline: none;
      }
      .input-group input:focus {
        border-color: var(--vscode-focusBorder);
      }
      .input-group input::placeholder {
        opacity: 0.45;
      }
      .clear-btn {
        position: absolute;
        right: 8px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        color: var(--vscode-foreground);
        opacity: 0.4;
        cursor: pointer;
        padding: 0;
        font-size: 14px;
        line-height: 1;
        display: none;
      }
      .clear-btn:hover {
        opacity: 0.8;
      }

      /* ── Primary button ── */
      .btn-primary {
        width: 100%;
        padding: 7px 0;
        background: #00aeec;
        color: #fff;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 13px;
        font-weight: 500;
        letter-spacing: 0.2px;
        transition: opacity 0.15s;
        margin-bottom: 12px;
      }
      .btn-primary:hover {
        opacity: 0.85;
      }
      .btn-primary:active {
        opacity: 0.7;
      }

      /* ── Divider ── */
      .section-label {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.6px;
        opacity: 0.45;
        margin-bottom: 6px;
      }

      /* ── History list ── */
      .history-list {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .history-item {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 8px;
        border-radius: 4px;
        cursor: pointer;
        transition: background 0.1s;
      }
      .history-item:hover {
        background: var(--vscode-list-hoverBackground);
      }
      .history-item .bvid {
        flex: 1;
        font-family: var(--vscode-editor-font-family, monospace);
        font-size: 12px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .history-item .del {
        opacity: 0;
        background: none;
        border: none;
        color: var(--vscode-foreground);
        cursor: pointer;
        font-size: 13px;
        padding: 0 2px;
        line-height: 1;
      }
      .history-item:hover .del {
        opacity: 0.5;
      }
      .history-item .del:hover {
        opacity: 1 !important;
      }
      .empty {
        opacity: 0.4;
        font-size: 12px;
        padding: 4px 0;
      }
    </style>
  </head>
  <body>
    <div class="logo">
      <div class="logo-icon">▶</div>
      <div>
        <div class="logo-text">Bilibili</div>
        <div class="logo-sub">Video Player</div>
      </div>
    </div>

    <div class="input-group">
      <input id="bvid" type="text" placeholder="BV ID — e.g. BV1xx411c7mD" autocomplete="off" spellcheck="false" />
      <button class="clear-btn" id="clearBtn" title="Clear">✕</button>
    </div>

    <button class="btn-primary" id="openBtn">▶ &nbsp;Open Video</button>

    <div class="section-label">Recent</div>
    <div class="history-list" id="historyList"></div>

    <script>
      const vscode = acquireVsCodeApi();
      let state = vscode.getState() || { history: [] };

      const input = document.getElementById("bvid");
      const clearBtn = document.getElementById("clearBtn");
      const openBtn = document.getElementById("openBtn");
      const listEl = document.getElementById("historyList");

      // Clear button visibility
      input.addEventListener("input", () => {
        clearBtn.style.display = input.value ? "block" : "none";
      });
      clearBtn.addEventListener("click", () => {
        input.value = "";
        clearBtn.style.display = "none";
        input.focus();
      });

      // Enter key support
      input.addEventListener("keydown", (e) => {
        if (e.key === "Enter") openVideo(input.value.trim());
      });

      openBtn.addEventListener("click", () => openVideo(input.value.trim()));

      function openVideo(bvid) {
        if (!bvid) return;
        // Deduplicate and keep latest 8
        state.history = [bvid, ...state.history.filter((b) => b !== bvid)].slice(0, 8);
        vscode.setState(state);
        renderHistory();
        vscode.postMessage({ command: "openVideo", bvid });
      }

      function renderHistory() {
        if (!state.history.length) {
          listEl.innerHTML = '<div class="empty">No recent videos</div>';
          return;
        }
        listEl.innerHTML = state.history
          .map(
            (bvid) => `
        <div class="history-item" data-bvid="${bvid}">
          <span>▶</span>
          <span class="bvid">${bvid}</span>
          <button class="del" data-del="${bvid}" title="Remove">✕</button>
        </div>
      `,
          )
          .join("");
      }

      listEl.addEventListener("click", (e) => {
        const delBtn = e.target.closest("[data-del]");
        if (delBtn) {
          const bvid = delBtn.dataset.del;
          state.history = state.history.filter((b) => b !== bvid);
          vscode.setState(state);
          renderHistory();
          return;
        }
        const item = e.target.closest(".history-item");
        if (item) openVideo(item.dataset.bvid);
      });

      renderHistory();
    </script>
  </body>
</html>
